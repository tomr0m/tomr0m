<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideIn {
        0% { opacity: 0; transform: translateX(-40px); }
        100% { opacity: 1; transform: translateX(0); }
      }
      .title {
        animation: slideIn 0.6s ease-out;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 48px;
        font-weight: 700;
        fill: #ffffff;
      }
      .subtitle {
        animation: slideIn 0.6s ease-out 0.1s both;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 16px;
        font-weight: 400;
        fill: #a0a0a0;
      }
      .tech {
        animation: slideIn 0.6s ease-out 0.2s both;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 14px;
        fill: #808080;
      }
      .line {
        stroke: #ffffff;
        stroke-width: 1;
        opacity: 0.4;
      }
    </style>
  </defs>
  
  <!-- Black background -->
  <rect width="1200" height="280" fill="#000000"/>
  
  <!-- Main text with animation -->
  <text x="80" y="110" class="title">Ilan Keselman</text>
  <text x="80" y="150" class="subtitle">Full Stack Developer</text>
  
  <!-- Simple line -->
  <line x1="80" y1="170" x2="250" y2="170" class="line"/>
  
  <!-- Tech stack -->
  <text x="80" y="220" class="tech">React • Node.js • WordPress</text>
</svg>
